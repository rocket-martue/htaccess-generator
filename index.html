<!DOCTYPE html>
<html lang="ja">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="WordPress 用 .htaccess のセキュリティ・パフォーマンス設定をブラウザで簡単に生成できるツール">
		<!-- OGP -->
		<meta property="og:type" content="website">
		<meta property="og:title" content=".htaccess Generator for WordPress">
		<meta property="og:description" content="WordPress 用 .htaccess のセキュリティ・パフォーマンス設定をブラウザで簡単に生成できるツール">
		<meta property="og:locale" content="ja_JP">
		<meta property="og:site_name" content=".htaccess Generator">
		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content=".htaccess Generator for WordPress">
		<meta name="twitter:description" content="WordPress 用 .htaccess のセキュリティ・パフォーマンス設定をブラウザで簡単に生成できるツール">

		<title>.htaccess Generator for WordPress</title>
		<link rel="stylesheet" href="css/style.css">
	</head>

	<body>
		<div class="app-wrapper">

			<header class="app-header">
				<h1>.htaccess Generator</h1>
				<p>WordPress 用 .htaccess のセキュリティ・パフォーマンス設定を簡単に生成</p>
				<div class="header-actions">
					<a href="guide/" class="header-link"><span aria-hidden="true">📖</span> ガイド</a>
					<button type="button" class="theme-toggle-btn" aria-label="ダークモードに切り替え" aria-pressed="false">
						<span class="theme-toggle-icon" aria-hidden="true">🌙</span>
						<span class="theme-toggle-label">ダーク</span>
					</button>
				</div>
			</header>

			<main>
				<div class="main-layout">

					<!-- ── 設定パネル ────────────────────── -->
					<div class="settings-panel">

						<!-- プリセット -->
						<section class="card" aria-label="プリセット">
							<h2 class="section-title">プリセット</h2>
							<div class="preset-group" role="group" aria-label="プリセット選択"></div>
						</section>

						<!-- Options & ErrorDocument -->
						<section class="card" aria-label="Options と ErrorDocument">
							<h2 class="section-title">Options & ErrorDocument</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="disableMultiviews">ディレクトリ一覧 &
										コンテンツネゴシエーション無効化</label>
									<label class="toggle-switch">
										<input type="checkbox" name="disableMultiviews" id="disableMultiviews">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="disableIndexes">ディレクトリインデックス無効化</label>
									<label class="toggle-switch">
										<input type="checkbox" name="disableIndexes" id="disableIndexes">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="errorDocument">ErrorDocument 軽量化（403 / 404）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="errorDocument" id="errorDocument">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
							</div>
						</section>

						<!-- ファイルアクセス制限 -->
						<section class="card" aria-label="ファイルアクセス制限">
							<h2 class="section-title">ファイルアクセス制限</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="blockXmlrpc">xmlrpc.php をブロック</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockXmlrpc" id="blockXmlrpc">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="protectWpConfig">wp-config.php を保護</label>
									<label class="toggle-switch">
										<input type="checkbox" name="protectWpConfig" id="protectWpConfig">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="protectHtaccess">.htaccess を保護</label>
									<label class="toggle-switch">
										<input type="checkbox" name="protectHtaccess" id="protectHtaccess">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockDangerousExt">危険な拡張子をブロック（.inc / .log / .sh /
										.sql）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockDangerousExt" id="blockDangerousExt">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>

								<hr class="divider">

								<div class="toggle-row">
									<label class="toggle-label" for="wpLoginBasicAuth">wp-login.php に Basic 認証</label>
									<label class="toggle-switch">
										<input type="checkbox" name="wpLoginBasicAuth" id="wpLoginBasicAuth">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="login-auth-fields" hidden>
									<div class="input-group">
										<label for="loginBasicAuthUser" class="input-label">ユーザー名</label>
										<input type="text" name="loginBasicAuthUser" id="loginBasicAuthUser"
											class="input-text" placeholder="admin" autocomplete="off"
											spellcheck="false">
									</div>
									<div class="input-group">
										<label for="loginHtpasswdPath" class="input-label">.htpasswd のフルパス</label>
										<input type="text" name="loginHtpasswdPath" id="loginHtpasswdPath"
											class="input-text" placeholder="/home/username/.htpasswd" autocomplete="off"
											spellcheck="false">
									</div>
								</div>
							</div>
						</section>

						<!-- IP ブロック -->
						<section class="card" aria-label="IP ブロック">
							<h2 class="section-title">IP アドレスブロック</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="ipBlockEnabled">IP アドレスによるブロック</label>
									<label class="toggle-switch">
										<input type="checkbox" name="ipBlockEnabled" id="ipBlockEnabled">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="ip-block-fields" hidden>
									<div class="input-group">
										<label for="ipBlockList" class="input-label">ブロックする IP（1行に1つ）</label>
										<textarea name="ipBlockList" id="ipBlockList" class="input-textarea" rows="4"
											placeholder="192.0.2.1&#10;198.51.100.0/24" spellcheck="false"></textarea>
									</div>
								</div>
							</div>
						</section>

						<!-- リライトルール -->
						<section class="card" aria-label="リライトルール">
							<h2 class="section-title">リライトルール</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="normalizeSlashes">スラッシュ重複の正規化</label>
									<label class="toggle-switch">
										<input type="checkbox" name="normalizeSlashes" id="normalizeSlashes">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockBadBots">悪意のあるボットをブロック</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockBadBots" id="blockBadBots">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockBackdoors">バックドア / マルウェア探索をブロック</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockBackdoors" id="blockBackdoors">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockWpNesting">wp-* 多重ネストを防止</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockWpNesting" id="blockWpNesting">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockWpIncludesDir">wp-includes
										ディレクトリの直接ブラウズ防止</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockWpIncludesDir" id="blockWpIncludesDir">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="httpsRedirect">HTTPS リダイレクト</label>
									<label class="toggle-switch">
										<input type="checkbox" name="httpsRedirect" id="httpsRedirect">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="xForwardedProto">X-Forwarded-Proto
										判定（リバースプロキシ対応）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="xForwardedProto" id="xForwardedProto">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="blockBadQuery">不正なクエリ文字列をブロック</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockBadQuery" id="blockBadQuery">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
							</div>
						</section>

						<!-- セキュリティヘッダー -->
						<section class="card" aria-label="セキュリティヘッダー">
							<h2 class="section-title">セキュリティレスポンスヘッダー</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label"
										for="hstsEnabled">HSTS（Strict-Transport-Security）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="hstsEnabled" id="hstsEnabled">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="cspEnabled">CSP（upgrade-insecure-requests）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="cspEnabled" id="cspEnabled">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="xContentType">X-Content-Type-Options:
										nosniff</label>
									<label class="toggle-switch">
										<input type="checkbox" name="xContentType" id="xContentType">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="xFrameOptions">X-Frame-Options: SAMEORIGIN</label>
									<label class="toggle-switch">
										<input type="checkbox" name="xFrameOptions" id="xFrameOptions">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="referrerPolicy">Referrer-Policy</label>
									<label class="toggle-switch">
										<input type="checkbox" name="referrerPolicy" id="referrerPolicy">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="permissionsPolicy">Permissions-Policy</label>
									<label class="toggle-switch">
										<input type="checkbox" name="permissionsPolicy" id="permissionsPolicy">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
							</div>
						</section>

						<!-- キャッシュ & パフォーマンス -->
						<section class="card" aria-label="キャッシュとパフォーマンス">
							<h2 class="section-title">キャッシュ & パフォーマンス</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="gzip">Gzip 圧縮</label>
									<label class="toggle-switch">
										<input type="checkbox" name="gzip" id="gzip">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="expires">ブラウザキャッシュ（Expires）</label>
									<label class="toggle-switch">
										<input type="checkbox" name="expires" id="expires">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="cacheControl">Cache-Control ヘッダー</label>
									<label class="toggle-switch">
										<input type="checkbox" name="cacheControl" id="cacheControl">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="etagDisable">ETag 無効化</label>
									<label class="toggle-switch">
										<input type="checkbox" name="etagDisable" id="etagDisable">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="mimeType">MIME タイプ追加</label>
									<label class="toggle-switch">
										<input type="checkbox" name="mimeType" id="mimeType">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="toggle-row">
									<label class="toggle-label" for="keepAlive">Keep-Alive 有効化</label>
									<label class="toggle-switch">
										<input type="checkbox" name="keepAlive" id="keepAlive">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
							</div>
						</section>

						<!-- wp-admin Basic 認証 -->
						<section class="card" aria-label="wp-admin Basic 認証">
							<h2 class="section-title">wp-admin Basic 認証</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="wpAdminBasicAuth">管理画面に Basic 認証</label>
									<label class="toggle-switch">
										<input type="checkbox" name="wpAdminBasicAuth" id="wpAdminBasicAuth">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
								<div class="wp-admin-fields" hidden>
									<div class="input-group">
										<label for="adminBasicAuthUser" class="input-label">ユーザー名</label>
										<input type="text" name="adminBasicAuthUser" id="adminBasicAuthUser"
											class="input-text" placeholder="admin" autocomplete="off"
											spellcheck="false">
									</div>
									<div class="input-group">
										<label for="adminHtpasswdPath" class="input-label">.htpasswd のフルパス</label>
										<input type="text" name="adminHtpasswdPath" id="adminHtpasswdPath"
											class="input-text" placeholder="/home/username/.htpasswd" autocomplete="off"
											spellcheck="false">
									</div>
									<div class="toggle-row">
										<label class="toggle-label" for="ajaxExclude">admin-ajax.php を除外</label>
										<label class="toggle-switch">
											<input type="checkbox" name="ajaxExclude" id="ajaxExclude" checked>
											<span class="toggle-track" aria-hidden="true"></span>
										</label>
									</div>
									<div class="toggle-row">
										<label class="toggle-label" for="upgradeIpExclude">upgrade.php のサーバー内部 IP
											除外</label>
										<label class="toggle-switch">
											<input type="checkbox" name="upgradeIpExclude" id="upgradeIpExclude">
											<span class="toggle-track" aria-hidden="true"></span>
										</label>
									</div>
									<div class="input-group">
										<label for="serverIp" class="input-label">サーバー内部 IP</label>
										<input type="text" name="serverIp" id="serverIp" class="input-text"
											placeholder="127.0.0.1" autocomplete="off" spellcheck="false">
									</div>
								</div>
							</div>
						</section>

						<!-- Uploads -->
						<section class="card" aria-label="wp-content/uploads 保護">
							<h2 class="section-title">wp-content/uploads 保護</h2>
							<div class="form-group">
								<div class="toggle-row">
									<label class="toggle-label" for="blockPhp">PHP 実行を禁止</label>
									<label class="toggle-switch">
										<input type="checkbox" name="blockPhp" id="blockPhp">
										<span class="toggle-track" aria-hidden="true"></span>
									</label>
								</div>
							</div>
						</section>

					</div>

					<!-- ── プレビューパネル ────────────────── -->
					<div class="preview-panel">
						<section class="card card-preview" aria-label=".htaccess プレビュー">
							<h2 class="section-title">プレビュー</h2>

							<!-- タブ -->
							<div class="tab-list" role="tablist" aria-label="生成ファイルの切り替え">
								<button type="button" class="tab-btn active" data-tab="root" role="tab"
									aria-selected="true">ルート .htaccess</button>
								<button type="button" class="tab-btn" data-tab="wp-admin" role="tab"
									aria-selected="false" hidden>wp-admin</button>
								<button type="button" class="tab-btn" data-tab="uploads" role="tab"
									aria-selected="false" hidden>uploads</button>
							</div>

							<!-- コード表示 -->
							<pre class="preview-pre"><code class="preview-code"># オプションを選択してください</code></pre>

							<!-- アクションボタン -->
							<div class="preview-actions">
								<button type="button" class="btn btn-primary btn-copy"
									aria-label="表示中の内容をクリップボードにコピー">コピー</button>
								<button type="button" class="btn btn-secondary btn-download"
									aria-label="表示中の内容を .htaccess ファイルとしてダウンロード">ダウンロード</button>
							</div>
						</section>
					</div>

				</div>
			</main>

		</div>

		<script type="module" src="js/main.js"></script>
	</body>

</html>
